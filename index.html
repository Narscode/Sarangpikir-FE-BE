<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#F5F5F0">
    <title>SarangPikir — Your Sanctuary for Peace of Mind</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <!-- Main App Container -->
    <div id="app">
        <!-- Dynamic content injected here -->
        <div id="page-content"></div>

        <!-- Toast Container -->
        <div id="toast-container" class="toast-container"></div>

        <!-- Bottom Navigation (hidden on welcome screen) -->
        <nav id="bottom-nav" class="bottom-nav hidden">
            <button class="nav-item" data-page="home" onclick="router.navigate('home')">
                <div class="nav-item-icon-wrapper">
                    <svg class="nav-icon" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                    </svg>
                </div>
                <span>Home</span>
            </button>
            <button class="nav-item" data-page="chat" onclick="router.navigate('chat')">
                <div class="nav-item-icon-wrapper">
                    <svg class="nav-icon" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path
                            d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z" />
                    </svg>
                </div>
                <span>Chat</span>
            </button>
            <button class="nav-item" data-page="mood" onclick="router.navigate('mood')">
                <div class="nav-item-icon-wrapper">
                    <svg class="nav-icon" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10" />
                        <path d="M8 14s1.5 2 4 2 4-2 4-2" />
                        <line x1="9" y1="9" x2="9.01" y2="9" />
                        <line x1="15" y1="9" x2="15.01" y2="9" />
                    </svg>
                </div>
                <span>Mood</span>
            </button>
            <button class="nav-item" data-page="library" onclick="router.navigate('library')">
                <div class="nav-item-icon-wrapper">
                    <svg class="nav-icon" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" />
                        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" />
                    </svg>
                </div>
                <span>Library</span>
            </button>
        </nav>
    </div>

    <!-- Scripts -->
    <script src="js/components/navbar.js"></script>
    <script src="js/components/moodCard.js"></script>
    <script src="js/components/chatBubble.js"></script>
    <script src="js/components/insightCard.js"></script>
    <script src="js/components/articleCard.js"></script>
    <script src="js/components/breathingGuide.js"></script>

    <script src="js/pages/welcome.js"></script>
    <script src="js/pages/moodLog.js"></script>
    <script src="js/pages/chat.js"></script>
    <script src="js/pages/insights.js"></script>
    <script src="js/pages/library.js"></script>
    <script src="js/pages/article.js"></script>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
